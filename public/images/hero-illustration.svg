<?xml version="1.0" encoding="utf-8"?>
<!-- Lightweight, geometric hero illustration.
     Accent color uses CSS variable `--color-hero-accent` when embedded in the page.
     Accessible: includes <title> and <desc>.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Abstract tournament illustration</title>
  <desc id="desc">A bold geometric composition with layered shapes and one accent color.</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feBlend in="SourceGraphic" in2="b" />
    </filter>
  </defs>

  <!-- background gradient -->
  <rect width="1200" height="800" fill="url(#g1)"/>

  <!-- large translucent circle to anchor composition -->
  <circle cx="860" cy="220" r="240" fill="#ffffff" fill-opacity="0.04" />

  <!-- rotated rectangle panel -->
  <g transform="translate(140,220) rotate(-12)">
    <rect x="0" y="0" width="760" height="420" rx="28" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="18" y="18" width="724" height="384" rx="18" fill="#071029" fill-opacity="0.25" filter="url(#soft)"/>
  </g>

  <!-- accent geometric mark (uses CSS var for easy theming) -->
  <g transform="translate(220,120)">
    <!-- fallback fill is provided; embedding page can override with --color-hero-accent -->
    <polygon points="0,220 220,0 440,220 220,360" fill="#FF6B6B" style="fill:var(--color-hero-accent, #FF6B6B);" opacity="0.98"/>
    <circle cx="220" cy="120" r="48" fill="#fff" fill-opacity="0.06"/>
    <circle cx="220" cy="120" r="18" fill="#fff" fill-opacity="0.12"/>
  </g>

  <!-- simple decorative chevrons -->
  <g fill="#ffffff" fill-opacity="0.06" transform="translate(620,380)">
    <path d="M0 0 L56 0 L28 36 z" transform="translate(0,0) rotate(12)"/>
    <path d="M0 48 L72 48 L36 96 z" transform="translate(40,10) rotate(-6)"/>
  </g>

  <!-- subtle grid lines to add structure -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="2">
    <line x1="80" y1="720" x2="1120" y2="720"/>
    <line x1="80" y1="680" x2="1120" y2="680"/>
    <line x1="80" y1="640" x2="1120" y2="640"/>
  </g>
</svg>
