<?xml version="1.0" encoding="utf-8"?>
<!-- Subtle diagonal-line texture as an SVG pattern.
     Designed to be lightweight and tileable; use as a background-image or inline.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Subtle diagonal texture">
  <defs>
    <pattern id="diag" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#000" stroke-opacity="0.04" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#diag)" />
</svg>
<?xml version="1.0" encoding="utf-8"?>
<!-- Subtle diagonal-line texture as an SVG pattern.
     Designed to be lightweight and tileable; use as `background-image: url("/public/textures/hero-texture.svg")` or inline.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Subtle diagonal texture">
  <defs>
    <pattern id="diag" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#000" stroke-opacity="0.04" stroke-width="1" />
    </pattern>
    <rect id="bg" width="200" height="200" fill="transparent"/>
  </defs>
  <rect width="200" height="200" fill="url(#diag)" />
</svg>
